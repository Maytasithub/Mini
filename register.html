<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - ระบบจองรถตู้</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #71b7e6, #9b59b6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            background: #ffffff;
            max-width: 450px;
            width: 100%;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.1);
        }

        .register-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: #666;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #9b59b6;
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background: #2ecc71;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-register:hover {
            background: #27ae60;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .login-link a {
            color: #9b59b6;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            body { align-items: flex-start; }
            .register-container { padding: 28px 20px; }
            .register-container h2 { font-size: 20px; line-height: 1.3; }
        }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>สร้างบัญชีผู้ใช้ใหม่</h2>
        
        <form id="registerForm">
            <div class="input-group">
                <label for="username">ชื่อผู้ใช้ (Username)</label>
                <input type="text" id="username" placeholder="ภาษาอังกฤษหรือตัวเลขเท่านั้น" required>
            </div>

            <div class="input-group">
                <label for="password">รหัสผ่าน (Password)</label>
                <input type="password" id="password" placeholder="ตั้งรหัสผ่านของคุณ" required>
            </div>

            <div class="input-group">
                <label for="fullName">ชื่อ - นามสกุลจริง</label>
                <input type="text" id="fullName" placeholder="เช่น นายสมชาย ใจดี" required>
            </div>

            <div class="input-group">
                <label for="phone">เบอร์โทรศัพท์ (สำหรับติดต่อ)</label>
                <input type="tel" id="phone" placeholder="เช่น 0812345678" pattern="[0-9]{9,10}" required>
            </div>

            <button type="submit" class="btn-register">ยืนยันการสมัครสมาชิก</button>
        </form>

        <div class="login-link">
            มีบัญชีผู้ใช้อยู่แล้ว? <a href="login.html">เข้าสู่ระบบที่นี่</a>
        </div>
    </div>

<script>
    document.getElementById('registerForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const fullName = document.getElementById('fullName').value;
        const phone = document.getElementById('phone').value;

        // [แก้ไขจุดที่ 1] เปลี่ยนชื่อคีย์ให้ตรงกับตาราง SQL (full_name)
        const userData = {
            username: username,
            password: password,
            full_name: fullName,
            phone: phone,
            role: 'passenger'
        };

        console.log("กำลังส่งข้อมูล:", userData);

        fetch('/api/register', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(userData)
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('เครือข่ายหลังบ้านมีปัญหา หรือไม่มีการตอบกลับ');
            }
            return response.json();
        })
        .then(data => {
            if(data.success) {
                alert('สมัครสมาชิกสำเร็จ! ข้อมูลวิ่งเข้า SQL เรียบร้อย');
                window.location.href = 'login.html';
            } else {
                alert('เกิดข้อผิดพลาดจากระบบ: ' + data.message);
            }
        })
        .catch(error => {
            console.error('รายละเอียดข้อผิดพลาด:', error);
            alert('ไม่สามารถเชื่อมต่อหลังบ้านได้! มีความเป็นไปได้ 2 อย่าง:\n1. ยังไม่ได้เปิดรันไฟล์ server.js\n2. รหัสผ่าน MySQL ในไฟล์ server.js ไม่ถูกต้อง');
        });
    });
</script>
</body>
</html>
